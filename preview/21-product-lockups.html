<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Product Lockups</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0F; color: #fff; }
  .card { width: 700px; padding: 28px 32px; box-sizing: border-box; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #00FAC2; margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .lock { padding: 16px 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; }
  .lock .name { font-family: var(--font-display); font-weight: 900; font-size: 22px; letter-spacing: 0.01em; line-height: 1; }
  .lock .name sup { font-size: 0.45em; vertical-align: super; font-weight: 700; color: #00FAC2; }
  .lock .desc { font-family: var(--font-body); font-size: 11px; color: #AFAAB9; margin-top: 8px; line-height: 1.4; }
</style>
</head>
<body class="asc-dark">
<div class="card">
  <div class="label">Trademarked products · how to typeset</div>
  <div class="grid">
    <div class="lock"><div class="name">AAVA<sup>™</sup></div><div class="desc">Intelligent Engineering Platform</div></div>
    <div class="lock"><div class="name">METAL</div><div class="desc">AI Talent Cloud</div></div>
    <div class="lock"><div class="name">JUMP</div><div class="desc">STEM workforce program</div></div>
    <div class="lock"><div class="name">RECODE</div><div class="desc">Change advisory</div></div>
  </div>
</div>
</body>
</html>
