<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; color: #0A0A0F; }
  .card { width: 700px; padding: 24px 32px; box-sizing: border-box; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #71758A; margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px 12px; }
  .icn { display: flex; flex-direction: column; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; color: #71758A; text-align: center; }
  .icn img { width: 28px; height: 28px; }
  .note { margin-top: 14px; font-family: var(--font-body); font-size: 11.5px; color: #71758A; line-height: 1.5; }
  .note b { color: #0A0A0F; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Iconography · Lucide (substituted)</div>
  <div class="grid">
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/brain.svg">brain</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/bot.svg">bot</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/cpu.svg">cpu</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/code-2.svg">code</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/zap.svg">zap</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/rocket.svg">rocket</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/shield-check.svg">shield</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/trending-up.svg">trending</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/database.svg">database</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/cloud.svg">cloud</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/users.svg">users</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/gauge.svg">gauge</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/check-circle-2.svg">check</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/bar-chart-3.svg">chart</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/eye.svg">eye</div>
    <div class="icn"><img src="https://cdn.jsdelivr.net/npm/lucide-static@latest/icons/wrench.svg">wrench</div>
  </div>
  <div class="note">Loaded from <b>cdn.jsdelivr.net/npm/lucide-static</b>. ⚠ Substitution — no native Ascendion icon library was supplied. Stroke 2px, 24px grid.</div>
</div>
</body>
</html>
