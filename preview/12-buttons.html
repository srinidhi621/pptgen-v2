<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { width: 700px; padding: 24px 32px; box-sizing: border-box; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #71758A; margin-bottom: 14px; }
  .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  .row .tag { font-family: var(--font-mono); font-size: 10px; color: #71758A; min-width: 90px; }
  .btn { font-family: var(--font-body); font-weight: 800; font-size: 13px; letter-spacing: 0.02em; padding: 11px 22px; border-radius: 4px; border: 0; cursor: pointer; transition: all 140ms cubic-bezier(0.2,0.7,0.2,1); display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: #00FAC2; color: #0A0A0F; }
  .btn-primary:hover { background: #00B88E; }
  .btn-dark { background: #0A0A0F; color: #fff; }
  .btn-dark:hover { background: #1A1A22; }
  .btn-outline { background: transparent; color: #0A0A0F; border: 1.5px solid #0A0A0F; padding: 9.5px 20.5px; }
  .btn-outline:hover { background: #0A0A0F; color: #fff; }
  .btn-ghost { background: transparent; color: #008566; padding: 11px 14px; }
  .btn-ghost:hover { color: #00B88E; background: rgba(0,250,194,0.08); }
  .arrow { font-size: 14px; line-height: 1; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Buttons</div>
  <div class="row">
    <span class="tag">Primary</span>
    <button class="btn btn-primary">Get Started <span class="arrow">→</span></button>
    <button class="btn btn-primary" style="background:#00B88E">:hover</button>
  </div>
  <div class="row">
    <span class="tag">Dark</span>
    <button class="btn btn-dark">Explore AAVA™</button>
    <button class="btn btn-outline">Read the case study</button>
  </div>
  <div class="row">
    <span class="tag">Ghost</span>
    <button class="btn btn-ghost">Learn more <span class="arrow">→</span></button>
  </div>
</div>
</body>
</html>
