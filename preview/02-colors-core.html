<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Core Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { width: 700px; padding: 24px 28px; box-sizing: border-box; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { aspect-ratio: 1.4 / 1; border-radius: 6px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-body); font-size: 11px; line-height: 1.3; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.9; }
  .sw .name { font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; font-size: 11px; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #71758A; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Core brand colors</div>
  <div class="row">
    <div class="sw" style="background:#00FAC2;color:#0A0A0F">
      <div class="name">Mint</div>
      <div class="hex">#00FAC2</div>
    </div>
    <div class="sw" style="background:#008566;color:#fff">
      <div class="name">Deep Teal</div>
      <div class="hex">#008566</div>
    </div>
    <div class="sw" style="background:#0A0A0F;color:#fff">
      <div class="name">Ink</div>
      <div class="hex">#0A0A0F</div>
    </div>
    <div class="sw" style="background:#71758A;color:#fff">
      <div class="name">Slate</div>
      <div class="hex">#71758A</div>
    </div>
    <div class="sw" style="background:#F5F4F7;color:#0A0A0F;border:1px solid #E8E6EC">
      <div class="name">Paper</div>
      <div class="hex">#F5F4F7</div>
    </div>
  </div>
</div>
</body>
</html>
