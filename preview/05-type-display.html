<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0F; color: #fff; }
  .card { width: 700px; padding: 28px 32px; box-sizing: border-box; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #00FAC2; margin-bottom: 14px; }
  .specimen { font-family: var(--font-display); font-weight: 900; line-height: 0.92; letter-spacing: -0.015em; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .row:last-child { border-bottom: 0; }
  .row .meta { font-family: var(--font-mono); font-size: 10px; color: #71758A; min-width: 78px; }
</style>
</head>
<body class="asc-dark">
<div class="card">
  <div class="label">Display · Archivo Black (sub. for PP Neue Machina)</div>
  <div class="row"><span class="meta">88 / 0.92</span><span class="specimen" style="font-size:42px">Engineering<sup style="font-size:0.55em;color:#00FAC2">AI</sup></span></div>
  <div class="row"><span class="meta">56 / 1.0</span><span class="specimen" style="font-size:32px">Power. Velocity. Trust.</span></div>
  <div class="row"><span class="meta">36 / 1.05</span><span class="specimen" style="font-size:24px">The AI-native disruptor</span></div>
</div>
</body>
</html>
