<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Hero Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0F; }
  .card { width: 700px; padding: 0; box-sizing: border-box; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .item { aspect-ratio: 1/1; position: relative; overflow: hidden; }
  .item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .item .lbl { position: absolute; bottom: 6px; left: 8px; right: 8px; font-family: var(--font-mono); font-size: 9px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
</style>
</head>
<body class="asc-dark">
<div class="card">
  <div class="item"><img src="../assets/brand-imagery/astronaut-cosmic-mint.jpeg"><div class="lbl">Cosmic · mint nebula</div></div>
  <div class="item"><img src="../assets/brand-imagery/cyberpunk-data-corridor.jpeg"><div class="lbl">Neon data corridor</div></div>
  <div class="item"><img src="../assets/brand-imagery/cloud-room-blue.jpeg"><div class="lbl">Surreal sky-room</div></div>
  <div class="item"><img src="../assets/brand-imagery/brain-lightbulb-network.jpeg"><div class="lbl">Brain · network</div></div>
  <div class="item"><img src="../assets/brand-imagery/rocket-launch.jpeg"><div class="lbl">Rocket launch</div></div>
  <div class="item"><img src="../assets/brand-imagery/a-shape-umbrella-jump.png"><div class="lbl">"A" knockout</div></div>
</div>
</body>
</html>
