<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #F5F4F7; }
  .card-frame { width: 700px; padding: 24px 32px; box-sizing: border-box; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #71758A; margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  /* Light card */
  .c { background: #fff; border-radius: 6px; padding: 18px; border: 1px solid rgba(10,10,15,0.08); }
  .c .eb { font-family: var(--font-body); font-weight: 800; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #008566; margin-bottom: 8px; }
  .c h4 { font-family: var(--font-display); font-weight: 900; font-size: 18px; line-height: 1.1; margin: 0 0 6px; color: #0A0A0F; letter-spacing: -0.01em; }
  .c p { font-family: var(--font-body); font-size: 12px; line-height: 1.45; color: #71758A; margin: 0; }
  /* Dark card */
  .cd { background: #0A0A0F; color: #fff; border-radius: 6px; padding: 18px; position: relative; overflow: hidden; }
  .cd::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #00FAC2; }
  .cd .eb { font-family: var(--font-body); font-weight: 800; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #00FAC2; margin-bottom: 8px; }
  .cd h4 { font-family: var(--font-display); font-weight: 900; font-size: 18px; line-height: 1.1; margin: 0 0 6px; letter-spacing: -0.01em; }
  .cd p { font-family: var(--font-body); font-size: 12px; line-height: 1.45; color: #AFAAB9; margin: 0; }
</style>
</head>
<body>
<div class="card-frame">
  <div class="label">Content cards · light & dark</div>
  <div class="row">
    <div class="c">
      <div class="eb">Capability</div>
      <h4>Platform Engineering<sup style="font-size:0.5em;color:#008566">AI</sup></h4>
      <p>Legacy applications transformed into modern software with AAVA™ studios.</p>
    </div>
    <div class="cd">
      <div class="eb">AAVA™ Studio</div>
      <h4>Quality Engineering<sup style="font-size:0.5em;color:#00FAC2">AI</sup></h4>
      <p>Reliable systems for business impact with high productivity.</p>
    </div>
  </div>
</div>
</body>
</html>
