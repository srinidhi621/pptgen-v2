<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Brand Mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0F; }
  .card { width: 700px; height: 180px; display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 0 32px; gap: 24px; }
  .lockup { display: flex; align-items: center; gap: 18px; }
  .a-tile { width: 76px; height: 96px; display: grid; place-items: center; background: #00FAC2; border-radius: 4px; }
  .a-tile img { width: 54px; }
  .wordmark { color: #fff; }
  .wordmark img { width: 220px; display: block; filter: invert(1) brightness(2); }
  .meta { color: #AFAAB9; font-family: var(--font-body); font-size: 13px; line-height: 1.45; }
  .meta b { color: #fff; font-weight: 800; }
  .swatch-row { display: flex; gap: 8px; margin-top: 12px; }
  .sw { width: 28px; height: 28px; border-radius: 4px; }
</style>
</head>
<body class="asc-dark">
<div class="card">
  <div class="lockup">
    <div class="a-tile">
      <img src="../assets/logos/ascendion-a-mark-white.svg" alt="">
    </div>
    <img class="wm" src="../assets/logos/ascendion-wordmark.svg" alt="ASCENDION" style="width:240px;filter:invert(1) brightness(2);">
  </div>
  <div class="meta">
    <b>Wordmark + A-mark</b><br>
    Heavy condensed slab letterforms, slight forward lean.<br>
    Pair the mint tile mark with the white wordmark on dark surfaces, or ink on light.
    <div class="swatch-row">
      <div class="sw" style="background:#00FAC2"></div>
      <div class="sw" style="background:#0A0A0F"></div>
      <div class="sw" style="background:#FFFFFF;border:1px solid #444"></div>
    </div>
  </div>
</div>
</body>
</html>
