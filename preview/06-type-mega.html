<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Mega Knockout</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0F; color: #fff; }
  .card { width: 700px; height: 240px; padding: 0; box-sizing: border-box; position: relative; overflow: hidden; }
  .label { position: absolute; top: 16px; left: 24px; font-family: var(--font-body); font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #00FAC2; z-index: 2; }
  .mega { font-family: var(--font-display-condensed); font-weight: 900; font-size: 92px; line-height: 0.86; letter-spacing: -0.03em; text-transform: uppercase; color: #00FAC2; transform: rotate(-14deg); position: absolute; top: 60px; left: -30px; white-space: nowrap; }
  .credit { position: absolute; bottom: 14px; right: 24px; font-family: var(--font-mono); font-size: 10px; color: #71758A; z-index: 2; }
</style>
</head>
<body class="asc-dark">
<div class="card">
  <div class="label">Mega knockout · rotated condensed display</div>
  <div class="mega">PROGRESS ISN'T<br>A STRAIGHT LINE</div>
  <div class="credit">Big Shoulders Display · 92px · −14°</div>
</div>
</body>
</html>
