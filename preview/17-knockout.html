<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Knockout Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0F; }
  .card { width: 700px; height: 260px; padding: 0; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; }
  .lhs, .rhs { display: grid; place-items: center; padding: 24px; position: relative; }
  .lhs { background: #0A0A0F; }
  .rhs { background: #F5F4F7; }
  .ko-photo {
    font-family: var(--font-display-condensed);
    font-weight: 900;
    font-size: 240px;
    line-height: 0.85;
    letter-spacing: -0.04em;
    color: transparent;
    -webkit-background-clip: text;
    background-clip: text;
    background-image: url('../assets/brand-imagery/astronaut-cosmic-mint.jpeg');
    background-size: cover;
    background-position: center;
  }
  .ko-grad {
    font-family: var(--font-display-condensed);
    font-weight: 900;
    font-size: 160px;
    line-height: 0.85;
    letter-spacing: -0.04em;
    color: transparent;
    -webkit-background-clip: text;
    background-clip: text;
    background-image: linear-gradient(180deg, #00FAC2 0%, #008566 100%);
  }
  .meta { position: absolute; bottom: 10px; left: 18px; font-family: var(--font-mono); font-size: 9.5px; color: #fff; opacity: 0.7; }
  .rhs .meta { color: #0A0A0F; }
</style>
</head>
<body>
<div class="card">
  <div class="lhs"><div class="ko-photo">A</div><div class="meta">background-clip: text · cosmic</div></div>
  <div class="rhs"><div class="ko-grad">AAVA</div><div class="meta">background-clip: text · gradient</div></div>
</div>
</body>
</html>
