<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Stat Treatment</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #0A0A0F; color: #fff; }
  .card { width: 700px; padding: 24px 32px; box-sizing: border-box; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #00FAC2; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .stat { padding: 6px 0; }
  .stat .n { font-family: var(--font-display); font-weight: 900; font-size: 56px; line-height: 0.95; letter-spacing: -0.02em; color: #00FAC2; }
  .stat .lbl { font-family: var(--font-body); font-weight: 700; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: #AFAAB9; margin-top: 6px; line-height: 1.3; }
</style>
</head>
<body class="asc-dark">
<div class="card">
  <div class="label">Stat blocks · the recurring 11,000+ / 400+ pattern</div>
  <div class="grid">
    <div class="stat"><div class="n">11,000<sup style="font-size:0.5em">+</sup></div><div class="lbl">Ascenders<br>globally</div></div>
    <div class="stat"><div class="n">400<sup style="font-size:0.5em">+</sup></div><div class="lbl">Enterprise<br>clients</div></div>
    <div class="stat"><div class="n">36<span style="font-size:0.7em">%</span></div><div class="lbl">of the<br>Fortune 500</div></div>
    <div class="stat"><div class="n">4</div><div class="lbl">AI<br>Studios</div></div>
  </div>
</div>
</body>
</html>
