<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ascendion · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { width: 700px; padding: 24px 28px; box-sizing: border-box; }
  .ramp { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; border-radius: 6px; overflow: hidden; }
  .step { aspect-ratio: 1 / 1.1; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); font-size: 9.5px; line-height: 1.2; }
  .step .name { font-family: var(--font-body); font-weight: 800; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
  .label { font-family: var(--font-body); font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: #71758A; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Neutrals · ink → white</div>
  <div class="ramp">
    <div class="step" style="background:#000000;color:#fff"><div class="name">Black</div><div>#000000</div></div>
    <div class="step" style="background:#0A0A0F;color:#fff"><div class="name">Ink</div><div>#0A0A0F</div></div>
    <div class="step" style="background:#1A1A22;color:#fff"><div class="name">Graphite</div><div>#1A1A22</div></div>
    <div class="step" style="background:#71758A;color:#fff"><div class="name">Slate</div><div>#71758A</div></div>
    <div class="step" style="background:#AFAAB9;color:#0A0A0F"><div class="name">Fog</div><div>#AFAAB9</div></div>
    <div class="step" style="background:#E8E6EC;color:#0A0A0F"><div class="name">Mist</div><div>#E8E6EC</div></div>
    <div class="step" style="background:#F5F4F7;color:#0A0A0F"><div class="name">Paper</div><div>#F5F4F7</div></div>
  </div>
</div>
</body>
</html>
